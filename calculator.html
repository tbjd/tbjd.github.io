<html>
    <head>
        <title>Calculator</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="shortcut icon" href="">

        <!-- Latest compiled and minified CSS -->
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.5.1/animate.min.css">
        <link href="css/calculator.css" rel="stylesheet" />
        <!-- jQuery library -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>

        <!-- Latest compiled JavaScript -->
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>

        <script type="text/javascript" src="js/calculator.js"></script>
    </head>
    <body>
        <div id="calculator" class="container ">
            <div class ="row">
                <div  id="memoire" class ="col-sm-12"></div>
            </div>
            <div class="row">
                <div id="afficheur" class="col-sm-12"></div>
            </div>
            <div class="row">
                <div class="col-sm-3">
                    <button id="btnAC" class="btnCarre" >AC</button>
                </div>
                <div class="col-sm-3">
                    <button id="gamble" class="btnCarre">Random</button>
                </div>
                <div class="col-sm-3">
                    <button id="btnModulo" class="btnCarre">%</button>
                </div>
                <div class="col-sm-3">
                    <button id="btnDivision" class="btnCarre">/</button>

                </div>
            </div>
            <div class="row">
                <div class="col-sm-3">
                    <button id="btn7" class="btnCarre">7</button>
                </div>
                <div class="col-sm-3">
                    <button id="btn8" class="btnCarre">8</button>
                </div>
                <div class="col-sm-3">
                    <button id="btn9" class="btnCarre">9</button>
                </div>
                <div class="col-sm-3">
                    <button id="btnMultiplication" class="btnCarre">*</button>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-3">
                    <button id="btn4" class="btnCarre">4</button>
                </div>
                <div class="col-sm-3">
                    <button id="btn5" class="btnCarre">5</button>
                </div>
                <div class="col-sm-3">
                    <button id="btn6" class="btnCarre">6</button>
                </div>
                <div class="col-sm-3">
                    <button id="btnDifference" class="btnCarre">-</button>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-3">
                    <button id="btn1" class="btnCarre">1</button>
                </div>
                <div class="col-sm-3">
                    <button id="btn2" class="btnCarre">2</button>
                </div>
                <div class="col-sm-3">
                    <button id="btn3" class="btnCarre">3</button>
                </div>
                <div class="col-sm-3">
                    <button id="btnAddition" class="btnCarre">+</button>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <button id="btn0" class="btn0">0</button>
                </div>
                <div class="col-sm-3">
                    <button id="btnDecimal" class="btnCarre">.</button>
                </div>
                <div class="col-sm-3">
                    <button id="btnEgale" class="btnCarre">=</button>
                </div>
            </div>
            </div>
    </body>
</html>
